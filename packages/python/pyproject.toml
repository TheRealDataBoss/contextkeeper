[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "workbench-ai"
version = "0.1.0"
description = "Universal AI session continuity protocol and CLI"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "TheRealDataBoss" },
]
keywords = [
    "ai",
    "claude",
    "chatgpt",
    "context",
    "continuity",
    "developer-tools",
    "cli",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "gitpython>=3.1.0",
    "jsonschema>=4.0.0",
    "httpx>=0.24.0",
    "questionary>=2.0.0",
]

[project.scripts]
workbench = "workbench_ai.cli:app"

[project.urls]
Homepage = "https://github.com/TheRealDataBoss/workbench"
Repository = "https://github.com/TheRealDataBoss/workbench"
Issues = "https://github.com/TheRealDataBoss/workbench/issues"
